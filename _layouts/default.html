<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-title">
      <a href="/">{{ site.title }}</a>
    </div>

    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/tags">Tags</a>
    </nav>
  </div>
</header>



<main class="page-layout">
  {% include toc.html %}
  <div class="page-content">
    {{ content }}
  </div>
</main>

<footer>
  <hr>
  <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  /* ---------- GLightbox ---------- */
  GLightbox();

  /* ---------- Expandable Code Blocks ---------- */

  const minLines = 20;

  document.querySelectorAll(".highlight pre, pre").forEach(function (block) {

    const styles = window.getComputedStyle(block);
    const lineHeight = parseFloat(styles.lineHeight);

    if (!lineHeight) return;

    const totalLines = Math.round(block.scrollHeight / lineHeight);

    if (totalLines > minLines) {

      // initial collapsed state
      block.style.maxHeight = (lineHeight * minLines) + "px";
      block.style.overflowY = "hidden";
      block.style.cursor = "pointer";

      block.addEventListener("click", function () {

        if (block.classList.contains("expanded")) {
          block.style.maxHeight = (lineHeight * minLines) + "px";
          block.style.overflowY = "hidden";
        } else {
          block.style.maxHeight = block.scrollHeight + "px";
          block.style.overflowY = "auto";
        }

        block.classList.toggle("expanded");
      });

    }

  });

});
</script>
</body>
</html>
